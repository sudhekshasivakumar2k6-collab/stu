<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result Portal</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            margin: 0;
            padding: 0;
            text-align: center;
        }

        .container {
            margin-top: 100px;
            background: white;
            padding: 30px;
            width: 350px;
            margin-left: auto;
            margin-right: auto;
            border-radius: 10px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
        }

        h1 {
            color: #333;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            background: #4facfe;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #007bff;
        }

        .result {
            margin-top: 20px;
            font-weight: bold;
            color: green;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Student Result Portal</h1>

        <input type="text" id="name" placeholder="Enter Name">
        <input type="text" id="regno" placeholder="Enter Register Number">

        <button onclick="showResult()">Check Result</button>

        <div class="result" id="output"></div>
    </div>

    <script>
        function showResult() {
            let name = document.getElementById("name").value;
            let regno = document.getElementById("regno").value;

            if(name === "" || regno === "") {
                document.getElementById("output").innerHTML = "Please fill all fields!";
                return;
            }

            document.getElementById("output").innerHTML =
                "Result for " + name + " (Reg No: " + regno + ") is PASS 🎉";
        }
    </script>

</body>
</html>
