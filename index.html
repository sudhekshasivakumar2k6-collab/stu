<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result Portal</title>

    <!-- Google Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #3a7bd5, #00d2ff);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: #f5f5f5;
            padding: 40px;
            width: 400px;
            border-radius: 15px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            color: #1a1a2e;
            margin-bottom: 10px;
        }

        .underline {
            width: 60px;
            height: 3px;
            background: #3a7bd5;
            margin: 10px auto 25px;
            border-radius: 2px;
        }

        .input-box {
            position: relative;
            margin: 15px 0;
        }

        .input-box input {
            width: 100%;
            padding: 12px 40px 12px 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            font-size: 14px;
        }

        .input-box i {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
        }

        .btn {
            margin-top: 20px;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(90deg, #6a11cb, #2575fc);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0px 5px 20px rgba(0,0,0,0.3);
        }

        .result {
            margin-top: 20px;
            font-weight: bold;
        }

        .success {
            color: green;
        }

        .error {
            color: red;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Student Result Portal</h1>
        <div class="underline"></div>

        <div class="input-box">
            <input type="text" id="name" placeholder="Enter Name">
            <i class="material-icons">person</i>
        </div>

        <div class="input-box">
            <input type="text" id="regno" placeholder="Enter Register Number">
            <i class="material-icons">badge</i>
        </div>

        <button class="btn" onclick="showResult()">
            🔍 Check Result
        </button>

        <div id="output" class="result"></div>
    </div>

    <script>
        function showResult() {
            let name = document.getElementById("name").value;
            let regno = document.getElementById("regno").value;
            let output = document.getElementById("output");

            if (name === "" || regno === "") {
                output.innerHTML = "⚠ Please fill all fields!";
                output.className = "result error";
                return;
            }

            output.innerHTML =
                "✅ Result for " + name + " (Reg No: " + regno + ") is PASS 🎉";
            output.className = "result success";
        }
    </script>

</body>
</html>
