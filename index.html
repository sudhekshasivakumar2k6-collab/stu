<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Result Portal</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    /* 🔥 Dark gradient background */
    background: linear-gradient(135deg, #1e3c72, #2a5298);
}

/* 🔥 Glass card effect */
.container {
    background: rgba(255, 255, 255, 0.1);
    padding: 35px;
    width: 350px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
    box-shadow: 0px 8px 25px rgba(0,0,0,0.3);
    text-align: center;
    color: white;
}

h1 {
    margin-bottom: 20px;
}

/* 🔥 Stylish inputs */
input {
    width: 100%;
    padding: 12px;
    margin: 12px 0;
    border: none;
    border-radius: 8px;
    outline: none;
    background: rgba(255,255,255,0.2);
    color: white;
    font-size: 14px;
}

input::placeholder {
    color: #ddd;
}

/* 🔥 MODERN BUTTON */
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 25px;
    font-size: 16px;
    cursor: pointer;
    color: white;

    background: linear-gradient(to right, #ff7e5f, #feb47b);
    transition: 0.3s ease;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0px 6px 15px rgba(0,0,0,0.4);
}

/* RESULT TEXT */
.result {
    margin-top: 20px;
    font-weight: bold;
}

.error {
    color: #ff4d4d;
}

.success {
    color: #00ffcc;
}
</style>

</head>

<body>

<div class="container">
    <h1>🎓 Student Result Portal</h1>

    <input type="text" id="name" placeholder="Enter Name">
    <input type="text" id="regno" placeholder="Enter Register Number">

    <button onclick="showResult()">🔍 Check Result</button>

    <div class="result" id="output"></div>
</div>

<script>
function showResult() {
    let name = document.getElementById("name").value;
    let regno = document.getElementById("regno").value;
    let output = document.getElementById("output");

    if(name === "" || regno === "") {
        output.innerHTML = "⚠ Please fill all fields!";
        output.className = "result error";
        return;
    }

    output.innerHTML =
        "✅ Result for " + name + " (Reg No: " + regno + ") is PASS 🎉";
    output.className = "result success";
}
</script>

</body>
</html>
