<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result Portal</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            margin: 0;
            padding: 0;
            text-align: center;
        }

        .container {
            margin-top: 100px;
            background: white;
            padding: 30px;
            width: 350px;
            margin-left: auto;
            margin-right: auto;
            border-radius: 12px;
            box-shadow: 0px 5px 20px rgba(0,0,0,0.2);
        }

        h1 {
            color: #333;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        /* 🔥 UPDATED BUTTON */
        button {
            padding: 12px 25px;
            background: linear-gradient(45deg, #4facfe, #00f2fe);
            border: none;
            color: white;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0px 5px 15px rgba(0,0,0,0.3);
        }

        .result {
            margin-top: 20px;
            font-weight: bold;
            font-size: 16px;
        }

        .error {
            color: red;
        }

        .success {
            color: green;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Student Result Portal</h1>

        <input type="text" id="name" placeholder="Enter Name">
        <input type="text" id="regno" placeholder="Enter Register Number">

        <!-- 🔥 UPDATED TEXT -->
        <button onclick="showResult()">Get Result 🚀</button>

        <div class="result" id="output"></div>
    </div>

    <script>
        function showResult() {
            let name = document.getElementById("name").value;
            let regno = document.getElementById("regno").value;
            let output = document.getElementById("output");

            if(name === "" || regno === "") {
                output.innerHTML = "⚠ Please fill all fields!";
                output.className = "result error";
                return;
            }

            output.innerHTML =
                "✅ Result for " + name + " (Reg No: " + regno + ") is PASS 🎉";
            output.className = "result success";
        }
    </script>

</body>
</html>
